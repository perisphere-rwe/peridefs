home:
  title: peridefs — Perisphere Medical Code Definitions
  description: |
    Pre-expanded, versioned medical code definitions (ICD-9, ICD-10, HCPCS, CPT, and drug generic names) for claims-based research. Developed by Perisphere RWE.
