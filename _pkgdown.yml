reference:
- title: Spec Data Objects
  desc: |
    All exported `spec_*` data objects. Each version of a condition or drug class is a distinct `_vX`-named object. Composite specs contain named versioned components accessible via `component=` (or `component = "all"` to union everything). Print any spec to see its definitions and component names.
  contents: spec_objects
- title: 'Conditions: Cardiovascular'
  desc: |
    Hypertension (v1, v2), heart failure (v1), and the ASCVD composite. ASCVD components (`chd_v1`, `chd_v2`, `stroke_v1`, `isch_stroke_v1`, `hf_v1`, `cerebrovasc_disease_v1`) are accessible via `get_ascvd_codes(component = ...)`.
  contents:
  - get_htn_v1_codes
  - get_htn_v1_defs
  - get_htn_v2_codes
  - get_htn_v2_defs
  - get_hf_v1_codes
  - get_hf_v1_defs
  - get_ascvd_codes
  - get_ascvd_defs
- title: 'Conditions: Metabolic & Renal'
  desc: |
    Obesity (v1), diabetes (v1–v3), hyperlipidemia (v1), and CKD (v1).
  contents:
  - get_obesity_v1_codes
  - get_obesity_v1_defs
  - get_diabetes_v1_codes
  - get_diabetes_v1_defs
  - get_diabetes_v2_codes
  - get_diabetes_v2_defs
  - get_diabetes_v3_codes
  - get_diabetes_v3_defs
  - get_hyperlipidemia_v1_codes
  - get_hyperlipidemia_v1_defs
  - get_ckd_v1_codes
  - get_ckd_v1_defs
- title: 'Conditions: Respiratory'
  desc: |
    COPD (v1) and sleep apnea (v1).
  contents:
  - get_copd_v1_codes
  - get_copd_v1_defs
  - get_osa_v1_codes
  - get_osa_v1_defs
  - get_ohs_v1_codes
  - get_ohs_v1_defs
  - get_asthma_v1_codes
  - get_asthma_v1_defs
- title: 'Conditions: Mental Health'
  desc: |
    Depression history (v1: diagnosis only; v2: diagnosis or antidepressive medication).
  contents:
  - get_depression_v1_codes
  - get_depression_v1_defs
  - get_depression_v2_codes
  - get_depression_v2_defs
- title: 'Drugs: Antihypertensives'
  desc: |
    ACE/ARBs, Beta-blockers, CCBs, diuretics, renin inhibitors, etc.
  contents:
  - get_antihypertensive_generics
  - get_antihypertensive_codes
  - get_antihypertensive_defs
- title: 'Drugs: Antidiabetics'
  desc: |
    Biguanides, sulfonylureas, meglitinides, TZDs, alpha-glucosidase inhibitors, DPP-4, SGLT-2, GLP-1, insulin, etc.
  contents:
  - get_antidiabetic_generics
  - get_antidiabetic_codes
  - get_antidiabetic_defs
- title: 'Drugs: Antiobesity'
  desc: |
    Non-GLP-1 agents (`non_glp1_v1`: naltrexone/bupropion, orlistat) and GLP-1 receptor agonists (`glp1_v1`: exenatide, dulaglutide, semaglutide, liraglutide, tirzepatide).
  contents:
  - get_antiobesity_generics
  - get_antiobesity_codes
  - get_antiobesity_defs
- title: 'Drugs: Antidepressives'
  desc: |
    SSRIs (`ssri_v1`), SNRIs (`snri_v1`), tricyclics (`tca_v1`), MAOIs (`maoi_v1`), and other/atypical agents (`other_v1`).
  contents:
  - get_antidepressive_generics
  - get_antidepressive_codes
  - get_antidepressive_defs
- title: General Accessor
  desc: |
    Low-level dispatcher that works on any spec object directly.
  contents: get_defs
- title: Custom Spec API
  desc: |
    Build your own code or drug specifications from scratch, or non-destructively modify any bundled spec.
  contents:
  - code_spec
  - drug_spec
  - add_codes
  - remove_codes
  - modify_code_spec
  - modify_drug_spec
- title: ICD-10-PCS Utilities
  desc: |
    Expand ICD-10-PCS prefix patterns (e.g., `"0210xxx"`) to all matching valid 7-character codes using the FY2026 CMS reference table.
  contents: expand_pcs
- title: R6 Spec Classes
  desc: |
    Underlying R6 classes used by all spec objects. Useful when building custom specs programmatically.
  contents:
  - CodeSpec
  - DrugSpec
  - CompositeCodeSpec
  - CompositeDrugSpec

